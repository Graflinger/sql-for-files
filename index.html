<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>SQL for Files</title>
    <meta name="theme-color" content="#2563eb" />
    <script>
      (function () {
        var storageKey = "ui-theme-mode";
        var darkMediaQuery = "(prefers-color-scheme: dark)";
        var lightThemeColor = "#f8fafc";
        var darkThemeColor = "#020617";
        var mode = "system";

        try {
          var storedMode = window.localStorage.getItem(storageKey);

          if (storedMode === "system" || storedMode === "light" || storedMode === "dark") {
            mode = storedMode;
          }
        } catch {}

        var resolvedTheme = mode === "dark" ? "dark" : "light";

        if (mode === "system") {
          try {
            if (window.matchMedia && window.matchMedia(darkMediaQuery).matches) {
              resolvedTheme = "dark";
            }
          } catch {}
        }

        var root = document.documentElement;
        root.classList.toggle("dark", resolvedTheme === "dark");
        root.dataset.themeMode = mode;
        root.style.colorScheme = resolvedTheme;

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute(
            "content",
            resolvedTheme === "dark" ? darkThemeColor : lightThemeColor
          );
        }
      })();
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />


  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Deferred Analytics (Add your analytics here) -->
    <!-- Example: Plausible, Simple Analytics, or Umami -->
  </body>
</html>
